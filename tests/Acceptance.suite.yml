# Codeception Acceptance Test Suite Configuration
#
# Perform tests in a browser by either emulating one using PhpBrowser, or in a real browser using WebDriver.
# If you need both WebDriver and PhpBrowser tests, create a separate suite for each.

actor: AcceptanceTester
modules:
  enabled:
    - PhpBrowser:
        url: "%SITE_URL%"
        # Force a fresh connection per request and ask the server to close it.
        # PHP's single-threaded built-in server (`php -S`) can deadlock when a
        # client holds a keep-alive socket open: the one worker blocks waiting
        # for the next request on that socket while a new connection waits to be
        # accepted, and the whole suite wedges (every later request times out
        # with cURL "Operation timed out"). Disabling keep-alive sidesteps it.
        headers:
          Connection: close
        curl:
          CURLOPT_PROXY: ""
          CURLOPT_FORBID_REUSE: true
          CURLOPT_FRESH_CONNECT: true
    - \Tests\Support\Helper\Acceptance
extensions:
  enabled:
    - Codeception\Extension\RunProcess:
        # Pass LAMB_LOGIN_PASSWORD through to the test web server: the app reads it
        # via getenv(), but .env is only loaded into Codeception's %param% space, not
        # exported to this child process. Without it, every login-gated test fails.
        0: env LAMB_DATA_DIR=../tests/Support/Data LAMB_LOGIN_PASSWORD=%LAMB_LOGIN_PASSWORD% php -S 0.0.0.0:%LAMB_TEST_PORT% -t src
        sleep: 1
step_decorators:
  - Codeception\Step\ConditionalAssertion
  - Codeception\Step\TryTo
  - Codeception\Step\Retry
env:
  # Run against an already-running external server (Docker/FrankenPHP, nginx+fpm):
  # %SITE_URL% in .env must point at it, and the server must use
  # tests/Support/Data as its data dir so the per-test DB reset in
  # Tests\Support\Helper\Acceptance::_before() takes effect.
  # Usage: vendor/bin/codecept run Acceptance --env external
  external:
    extensions:
      enabled:
        - Codeception\Extension\RunProcess:
            # Neutralise the self-started dev server; the external server is already up.
            0: sleep 86400
            sleep: 0
